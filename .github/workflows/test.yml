name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install C/C++ build dependencies for Tasmanian
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential

      - name: Install Tasmanian (PyPI, builds from source)
        run: |
          pip install --upgrade pip wheel setuptools
          pip install numpy
          pip install Tasmanian

      - name: Install sparsepea
        run: pip install -e . --no-deps

      - name: Install test dependencies
        run: pip install pytest numba

      - name: Smoke import
        run: |
          python -c "import Tasmanian; print('Tasmanian imported OK')"
          python -c "import sparsepea; print('sparsepea imported OK')"

      - name: Run tests
        run: pytest tests/ -v
