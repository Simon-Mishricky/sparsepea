name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tasmanian from apt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-tasmanian python3-numpy python3-pip

      - name: Install sparsepea + test deps
        run: |
          # Use system Python so it can find python3-tasmanian (installed
          # by apt into /usr/lib/python3/dist-packages, not the venv).
          python3 -m pip install --user --break-system-packages numba pytest matplotlib
          python3 -m pip install --user --break-system-packages -e . --no-deps

      - name: Smoke import
        run: |
          python3 -c "import Tasmanian; print('Tasmanian:', Tasmanian.__file__)"
          python3 -c "import sparsepea; print('sparsepea OK')"

      - name: Run tests
        run: python3 -m pytest tests/ -v
