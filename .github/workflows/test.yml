name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict
          auto-activate-base: false
          activate-environment: sparsepea-ci

      - name: Install Tasmanian (conda-forge)
        run: conda install -y -n sparsepea-ci -c conda-forge tasmanian

      - name: Install package and test dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v
