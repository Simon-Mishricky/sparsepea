name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install C/C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gfortran cmake

      - name: Pre-install Tasmanian build prerequisites
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install scikit-build "cmake>=3.19" packaging numpy

      - name: Install Tasmanian from PyPI
        run: python -m pip install --no-cache-dir Tasmanian

      - name: Install sparsepea + test deps
        run: |
          python -m pip install numba matplotlib pytest
          python -m pip install -e . --no-deps

      - name: Smoke import
        run: |
          python -c "import Tasmanian; print('Tasmanian OK at:', Tasmanian.__file__)"
          python -c "import sparsepea; print('sparsepea OK')"

      - name: Run tests
        run: pytest tests/ -v
