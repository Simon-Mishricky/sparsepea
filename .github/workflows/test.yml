name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up environment with Tasmanian
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: sparsepea-ci
          create-args: >-
            python=3.11
            tasmanian
            numpy
            numba
            pytest
          init-shell: bash
          cache-environment: true

      - name: Install package
        run: pip install -e . --no-deps

      - name: Show environment
        run: |
          python -c "import Tasmanian; print('Tasmanian:', Tasmanian.__version__ if hasattr(Tasmanian, '__version__') else 'imported OK')"
          python -c "import sparsepea; print('sparsepea OK')"

      - name: Run tests
        run: pytest tests/ -v
